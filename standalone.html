<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jack — 3D Creator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background-color: #0C0C0C; font-family: 'Kanit', sans-serif; overflow-x: hidden; }
    a { text-decoration: none; color: inherit; }

    /* Gradient text utility */
    .hero-heading {
      background: linear-gradient(180deg, #646973 0%, #BBCCD7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* FadeIn animation */
    .fade-in {
      opacity: 0;
      transform: translateY(var(--fade-y, 30px)) translateX(var(--fade-x, 0px));
      transition: opacity 0.7s cubic-bezier(0.25, 0.1, 0.25, 1), transform 0.7s cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .fade-in.visible {
      opacity: 1;
      transform: translateY(0) translateX(0);
    }

    /* ===== HERO SECTION ===== */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: clip;
    }
    .hero-inner {
      display: flex;
      flex-direction: column;
      flex: 1;
      padding: 0 10px;
      position: relative;
      z-index: 0;
    }

    /* Navbar */
    .navbar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 24px 0;
    }
    .navbar a {
      color: #D7E2EA;
      font-size: 0.875rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: opacity 0.2s;
    }
    .navbar a:hover { opacity: 0.7; }

    /* Hero heading */
    .hero-title-wrap { margin-top: 24px; overflow: hidden; }
    .hero-title {
      font-weight: 900;
      text-transform: uppercase;
      line-height: 0.85;
      letter-spacing: -0.02em;
      white-space: nowrap;
      width: 100%;
      font-size: 14vw;
    }

    /* Hero bottom */
    .hero-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-bottom: 28px;
      padding-left: 24px;
      padding-right: 24px;
    }
    .hero-tagline {
      color: #D7E2EA;
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      line-height: 1.4;
      max-width: 160px;
      font-size: clamp(0.75rem, 1.4vw, 1.5rem);
    }

    /* Contact Button */
    .contact-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 9999px;
      padding: 12px 32px;
      color: white;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 0.75rem;
      white-space: nowrap;
      background: linear-gradient(123deg, #18011F 7%, #B600A8 37%, #7621B0 72%, #BE4C00 100%);
      box-shadow: 0px 4px 4px rgba(181, 1, 167, 0.25), 4px 4px 12px #7721B1 inset;
      outline: 2px solid #E3E3E3;
      outline-offset: -3px;
      transition: opacity 0.2s;
    }
    .contact-btn:hover { opacity: 0.9; }
    .contact-btn:active { opacity: 0.75; }

    /* Hero portrait with magnet */
    .hero-portrait-wrap {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      width: 280px;
      top: 50%;
      transform: translate(-50%, -50%);
    }
    .hero-portrait-inner {
      transition: transform 0.6s ease-in-out;
      will-change: transform;
    }
    .hero-portrait-inner img {
      width: 100%;
      height: auto;
      object-fit: contain;
    }

    /* ===== MARQUEE SECTION ===== */
    .marquee-section {
      width: 100%;
      overflow: hidden;
      padding-top: 96px;
      padding-bottom: 40px;
      background-color: #0C0C0C;
    }
    .marquee-rows { display: flex; flex-direction: column; gap: 12px; }
    .marquee-row {
      display: flex;
      gap: 12px;
      will-change: transform;
      overflow: visible;
    }
    .marquee-tile {
      flex-shrink: 0;
      width: 420px;
      height: 270px;
      border-radius: 16px;
      overflow: hidden;
    }
    .marquee-tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ===== ABOUT SECTION ===== */
    .about-section {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      position: relative;
    }
    .about-decor {
      position: absolute;
      z-index: 0;
    }
    .about-decor img { width: 100%; height: auto; }
    .about-decor.top-left { top: 4%; left: 1%; width: 120px; }
    .about-decor.bottom-left { bottom: 8%; left: 3%; width: 100px; }
    .about-decor.top-right { top: 4%; right: 1%; width: 120px; }
    .about-decor.bottom-right { bottom: 8%; right: 3%; width: 130px; }

    .about-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 64px;
      max-width: 896px;
      width: 100%;
      position: relative;
      z-index: 10;
    }
    .about-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      width: 100%;
    }
    .about-heading {
      font-weight: 900;
      text-transform: uppercase;
      line-height: 0.85;
      letter-spacing: -0.02em;
      text-align: center;
      width: 100%;
      font-size: clamp(3rem, 12vw, 160px);
    }
    .about-text {
      color: #D7E2EA;
      font-weight: 500;
      text-align: center;
      line-height: 1.7;
      max-width: 560px;
      font-size: clamp(1rem, 2vw, 1.35rem);
    }
    .about-text .char {
      position: relative;
      display: inline-block;
    }
    .about-text .char-placeholder {
      visibility: hidden;
      font-weight: 500;
    }
    .about-text .char-visible {
      position: absolute;
      inset: 0;
      font-weight: 500;
      color: #D7E2EA;
      opacity: 0.2;
      transition: opacity 0.1s;
    }

    /* ===== SERVICES SECTION ===== */
    .services-section {
      display: flex;
      flex-direction: column;
      padding: 80px 20px;
      border-radius: 40px 40px 0 0;
      background-color: #FFFFFF;
    }
    .services-heading {
      font-weight: 900;
      text-transform: uppercase;
      line-height: 0.85;
      letter-spacing: -0.02em;
      text-align: center;
      width: 100%;
      margin-bottom: 64px;
      font-size: clamp(3rem, 12vw, 160px);
      color: #0C0C0C;
    }
    .services-list {
      display: flex;
      flex-direction: column;
      width: 100%;
      align-items: center;
    }
    .service-item-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 1024px;
    }
    .service-divider {
      width: 100%;
      border-top: 1px solid rgba(12, 12, 12, 0.15);
    }
    .service-item {
      display: flex;
      align-items: flex-start;
      gap: 24px;
      padding: 32px 0;
      width: 100%;
    }
    .service-number {
      font-weight: 900;
      text-transform: uppercase;
      line-height: 0.85;
      flex-shrink: 0;
      font-size: clamp(3rem, 10vw, 140px);
      color: #0C0C0C;
    }
    .service-info { display: flex; flex-direction: column; gap: 8px; padding-top: 4px; }
    .service-name {
      font-weight: 500;
      text-transform: uppercase;
      font-size: clamp(1rem, 2.2vw, 2.1rem);
      color: #0C0C0C;
    }
    .service-desc {
      font-weight: 300;
      line-height: 1.7;
      max-width: 672px;
      font-size: clamp(0.85rem, 1.6vw, 1.25rem);
      color: #0C0C0C;
      opacity: 0.6;
    }

    /* ===== PROJECTS SECTION ===== */
    .projects-section {
      position: relative;
      padding: 0 20px;
      border-radius: 40px 40px 0 0;
      margin-top: -40px;
      z-index: 10;
      background-color: #0C0C0C;
    }
    .projects-heading-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 0;
    }
    .projects-heading {
      font-weight: 900;
      text-transform: uppercase;
      line-height: 0.85;
      letter-spacing: -0.02em;
      text-align: center;
      width: 100%;
      font-size: clamp(3rem, 12vw, 160px);
    }
    .project-card-container {
      height: 85vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      position: sticky;
      top: 96px;
    }
    .project-card {
      position: absolute;
      width: 100%;
      max-width: 1760px;
      border-radius: 40px;
      border: 2px solid #D7E2EA;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      background-color: #0C0C0C;
      transform-origin: top center;
      will-change: transform;
    }
    .project-card-header {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .project-card-meta {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .project-card-number {
      color: #D7E2EA;
      font-weight: 900;
      text-transform: uppercase;
      line-height: 0.85;
      font-size: clamp(3rem, 10vw, 140px);
    }
    .project-card-info { display: flex; flex-direction: column; gap: 8px; }
    .project-card-category {
      color: #D7E2EA;
      font-weight: 500;
      text-transform: uppercase;
      font-size: clamp(1rem, 2.2vw, 2.1rem);
    }
    .project-card-name {
      color: #D7E2EA;
      font-weight: 300;
      letter-spacing: 0.05em;
      font-size: clamp(0.9rem, 2vw, 2rem);
    }
    .live-project-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 9999px;
      border: 2px solid #D7E2EA;
      padding: 12px 32px;
      color: #D7E2EA;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 0.875rem;
      white-space: nowrap;
      transition: background-color 0.2s;
      align-self: flex-start;
    }
    .live-project-btn:hover { background-color: rgba(215, 226, 234, 0.1); }

    .project-card-images {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
    }
    .project-card-col1 {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
    }
    .project-card-col1 img {
      width: 100%;
      object-fit: cover;
      border-radius: 30px;
    }
    .project-card-col1 img:first-child { height: clamp(130px, 16vw, 230px); }
    .project-card-col1 img:last-child { height: clamp(160px, 22vw, 340px); }
    .project-card-col2 {
      width: 100%;
    }
    .project-card-col2 img {
      width: 100%;
      object-fit: cover;
      border-radius: 30px;
      height: 300px;
    }

    /* ===== RESPONSIVE ===== */
    @media (min-width: 640px) {
      .navbar { padding: 24px 24px 0; }
      .navbar a { font-size: 1rem; }
      .hero-title-wrap { margin-top: 16px; }
      .hero-title { font-size: 15vw; }
      .hero-bottom { padding-bottom: 32px; }
      .hero-tagline { max-width: 220px; }
      .hero-portrait-wrap {
        width: 360px;
        top: auto;
        bottom: 0;
        transform: translateX(-50%);
      }
      .contact-btn { padding: 14px 40px; font-size: 0.875rem; }
      .marquee-section { padding-top: 128px; }
      .about-section { padding: 80px 32px; }
      .about-decor.top-left { width: 160px; left: 2%; }
      .about-decor.bottom-left { width: 140px; left: 6%; }
      .about-decor.top-right { width: 160px; right: 2%; }
      .about-decor.bottom-right { width: 170px; right: 6%; }
      .about-content { gap: 80px; }
      .about-inner { gap: 56px; }
      .services-section { padding: 96px 32px; border-radius: 50px 50px 0 0; }
      .services-heading { margin-bottom: 80px; }
      .service-item { gap: 32px; padding: 40px 0; }
      .service-info { gap: 16px; }
      .projects-section { padding: 0 32px; border-radius: 50px 50px 0 0; margin-top: -48px; }
      .projects-heading-wrap { padding: 96px 0; }
      .project-card { border-radius: 50px; padding: 24px; gap: 32px; }
      .project-card-header { flex-direction: row; align-items: center; justify-content: space-between; }
      .project-card-meta { gap: 32px; }
      .project-card-info { gap: 16px; }
      .live-project-btn { padding: 14px 40px; }
    }

    @media (min-width: 768px) {
      .navbar { padding: 32px 40px 0; }
      .navbar a { font-size: 1.4rem; }
      .hero-inner { padding: 0 40px; }
      .hero-title-wrap { margin-top: -20px; }
      .hero-title { font-size: 16vw; }
      .hero-bottom { padding-bottom: 40px; padding-left: 40px; padding-right: 40px; }
      .hero-tagline { max-width: 260px; }
      .hero-portrait-wrap { width: 440px; }
      .contact-btn { padding: 16px 48px; font-size: 1rem; }
      .marquee-section { padding-top: 160px; }
      .about-section { padding: 80px 40px; }
      .about-decor.top-left { width: 210px; left: 4%; }
      .about-decor.bottom-left { width: 180px; left: 10%; }
      .about-decor.top-right { width: 210px; right: 4%; }
      .about-decor.bottom-right { width: 220px; right: 10%; }
      .about-content { gap: 96px; }
      .about-inner { gap: 64px; }
      .services-section { padding: 128px 40px; border-radius: 60px 60px 0 0; }
      .services-heading { margin-bottom: 112px; }
      .service-item { gap: 40px; padding: 48px 0; }
      .service-info { gap: 20px; }
      .projects-section { padding: 0 40px; border-radius: 60px 60px 0 0; margin-top: -56px; }
      .projects-heading-wrap { padding: 128px 0; }
      .project-card { border-radius: 60px; padding: 32px; gap: 40px; }
      .project-card-container { top: 128px; }
      .project-card-meta { gap: 40px; }
      .project-card-info { gap: 24px; }
      .project-card-images { flex-direction: row; gap: 20px; }
      .project-card-col1 { width: 40%; gap: 20px; }
      .project-card-col2 { width: 60%; }
      .project-card-col2 img { height: 100%; border-radius: 60px; }
      .project-card-col1 img { border-radius: 60px; }
    }

    @media (min-width: 1024px) {
      .hero-title { font-size: 17.5vw; }
      .hero-portrait-wrap { width: 520px; }
    }
  </style>
</head>

        images: {
          col1: [
            'https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260412_055344_5eff02e0-87a5-41ce-b64f-eb08da8f33db.png&w=1280&q=85',
            'https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260412_055431_11d841fd-8b41-46a5-82e4-b04f2407a7d8.png&w=1280&q=85',
          ],
          col2: 'https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260412_055451_e317bf2d-28d4-48cc-86b0-6f72f25b6327.png&w=1280&q=85',
        },
      },
      {
        number: '02', category: 'Personal', name: 'Aura Brand Identity', href: '#',
        images: {
          col1: [
            'https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260412_055654_911201c5-36d9-4bc6-bac7-331adfce159f.png&w=1280&q=85',
            'https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260412_055723_5ceda0b8-d9c2-4665-b2e3-83ba19ba76d1.png&w=1280&q=85',
          ],
          col2: 'https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260412_055753_adc5dcbd-a8e6-49c0-b43a-9b030d835cea.png&w=1280&q=85',
        },
      },
      {
        number: '03', category: 'Client', name: 'Solaris Digital', href: '#',
        images: {
          col1: [
            'https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260412_055759_963cfb0b-4bd1-4b0f-9d0a-09bd6cf95b2f.png&w=1280&q=85',
            'https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260412_060108_438f781a-9846-4dcc-89ab-c4e6cb830f5b.png&w=1280&q=85',
          ],
          col2: 'https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260412_055818_9d062121-ad7e-46b9-999a-1a6a692ef1ee.png&w=1280&q=85',
        },
      },
    ];

    const ABOUT_TEXT = "With more than five years of experience in design, i focus on branding, web design, and user experience, i truly enjoy working with businesses that aim to stand out and present their best image. Let\u2019s build something incredible together!";

    // ===== RENDER MARQUEE =====
    const row1Images = MARQUEE_IMAGES.slice(0, 11);
    const row2Images = MARQUEE_IMAGES.slice(11);
    const row1El = document.getElementById('marqueeRow1');
    const row2El = document.getElementById('marqueeRow2');

    function createMarqueeTiles(images, container) {
      const tripled = [...images, ...images, ...images];
      tripled.forEach(src => {
        const div = document.createElement('div');
        div.className = 'marquee-tile';
        div.innerHTML = `<img src="${src}" alt="" loading="lazy" />`;
        container.appendChild(div);
      });
    }
    createMarqueeTiles(row1Images, row1El);
    createMarqueeTiles(row2Images, row2El);

    // ===== RENDER ANIMATED TEXT =====
    const textContainer = document.getElementById('animatedText');
    ABOUT_TEXT.split('').forEach((char, i) => {
      const span = document.createElement('span');
      span.className = 'char';
      span.dataset.index = i;
      const placeholder = document.createElement('span');
      placeholder.className = 'char-placeholder';
      placeholder.textContent = char === ' ' ? '\u00A0' : char;
      const visible = document.createElement('span');
      visible.className = 'char-visible';
      visible.textContent = char === ' ' ? '\u00A0' : char;
      span.appendChild(placeholder);
      span.appendChild(visible);
      textContainer.appendChild(span);
    });

    // ===== RENDER SERVICES =====
    const servicesList = document.getElementById('servicesList');
    SERVICES.forEach((service, i) => {
      const wrap = document.createElement('div');
      wrap.className = 'service-item-wrap fade-in';
      wrap.style.setProperty('--fade-y', '30px');
      wrap.dataset.delay = String(i * 100);
      let html = '';
      if (i > 0) html += '<div class="service-divider"></div>';
      html += `
        <div class="service-item">
          <span class="service-number">${service.number}</span>
          <div class="service-info">
            <span class="service-name">${service.name}</span>
            <span class="service-desc">${service.description}</span>
          </div>
        </div>
      `;
      wrap.innerHTML = html;
      servicesList.appendChild(wrap);
    });

    // ===== RENDER PROJECT CARDS =====
    const projectCardsContainer = document.getElementById('projectCards');
    PROJECTS.forEach((project, index) => {
      const container = document.createElement('div');
      container.className = 'project-card-container';
      container.innerHTML = `
        <div class="project-card" style="top: ${index * 28}px;" data-project-index="${index}">
          <div class="project-card-header">
            <div class="project-card-meta">
              <span class="project-card-number">${project.number}</span>
              <div class="project-card-info">
                <span class="project-card-category">${project.category}</span>
                <span class="project-card-name">${project.name}</span>
              </div>
            </div>
            <a href="${project.href}" class="live-project-btn" target="_blank" rel="noopener noreferrer">Live Project</a>
          </div>
          <div class="project-card-images">
            <div class="project-card-col1">
              <img src="${project.images.col1[0]}" alt="${project.name} preview 1" />
              <img src="${project.images.col1[1]}" alt="${project.name} preview 2" />
            </div>
            <div class="project-card-col2">
              <img src="${project.images.col2}" alt="${project.name} main" />
            </div>
          </div>
        </div>
      `;
      projectCardsContainer.appendChild(container);
    });

    // ===== FADE-IN OBSERVER =====
    const fadeObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const delay = parseInt(entry.target.dataset.delay || '0', 10);
          setTimeout(() => {
            entry.target.classList.add('visible');
          }, delay);
          fadeObserver.unobserve(entry.target);
        }
      });
    }, { rootMargin: '50px', threshold: 0 });

    document.querySelectorAll('.fade-in').forEach(el => fadeObserver.observe(el));

    // ===== MARQUEE SCROLL =====
    const marqueeSection = document.getElementById('marqueeSection');
    function handleMarqueeScroll() {
      if (!marqueeSection) return;
      const rect = marqueeSection.getBoundingClientRect();
      const sectionTop = window.scrollY + rect.top;
      const scrolled = window.scrollY - sectionTop + window.innerHeight;
      const offset = scrolled * 0.3;
      row1El.style.transform = `translateX(${offset - 200}px)`;
      row2El.style.transform = `translateX(${-(offset - 200)}px)`;
    }

    // ===== ANIMATED TEXT SCROLL =====
    function handleTextScroll() {
      const rect = textContainer.getBoundingClientRect();
      const viewH = window.innerHeight;
      const start = viewH * 0.8;
      const end = viewH * 0.2;
      const totalHeight = rect.height + (start - end);
      const scrolled = start - rect.top;
      const progress = Math.max(0, Math.min(1, scrolled / totalHeight));

      const chars = textContainer.querySelectorAll('.char-visible');
      const total = chars.length;
      chars.forEach((charEl, i) => {
        const charProgress = i / total;
        const charStart = Math.max(0, charProgress - 0.1);
        const charEnd = Math.min(1, charProgress + 0.05);
        let opacity;
        if (progress <= charStart) opacity = 0.2;
        else if (progress >= charEnd) opacity = 1;
        else opacity = 0.2 + (0.8 * (progress - charStart) / (charEnd - charStart));
        charEl.style.opacity = opacity;
      });
    }

    // ===== PROJECT CARDS SCALE =====
    const projectsSection = document.getElementById('projects');
    function handleProjectScale() {
      if (!projectsSection) return;
      const rect = projectsSection.getBoundingClientRect();
      const sectionHeight = projectsSection.scrollHeight;
      const scrolled = -rect.top;
      const progress = Math.max(0, Math.min(1, scrolled / (sectionHeight - window.innerHeight)));

      const totalCards = PROJECTS.length;
      document.querySelectorAll('.project-card').forEach(card => {
        const index = parseInt(card.dataset.projectIndex, 10);
        const rangeStart = index / totalCards;
        const targetScale = 1 - (totalCards - 1 - index) * 0.03;
        let scale;
        if (progress <= rangeStart) scale = 1;
        else scale = 1 - (1 - targetScale) * ((progress - rangeStart) / (1 - rangeStart));
        scale = Math.max(targetScale, Math.min(1, scale));
        card.style.transform = `scale(${scale})`;
      });
    }

    // ===== MAGNET EFFECT =====
    const magnetWrap = document.getElementById('magnetWrap');
    const magnetInner = document.getElementById('magnetInner');
    const MAGNET_PADDING = 150;
    const MAGNET_STRENGTH = 3;

    function handleMouseMove(e) {
      if (!magnetWrap) return;
      const rect = magnetWrap.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const distX = Math.abs(centerX - e.clientX);
      const distY = Math.abs(centerY - e.clientY);

      if (distX < rect.width / 2 + MAGNET_PADDING && distY < rect.height / 2 + MAGNET_PADDING) {
        magnetInner.style.transition = 'transform 0.3s ease-out';
        const x = (e.clientX - centerX) / MAGNET_STRENGTH;
        const y = (e.clientY - centerY) / MAGNET_STRENGTH;
        magnetInner.style.transform = `translate3d(${x}px, ${y}px, 0)`;
      } else {
        magnetInner.style.transition = 'transform 0.6s ease-in-out';
        magnetInner.style.transform = 'translate3d(0, 0, 0)';
      }
    }

    // ===== EVENT LISTENERS =====
    window.addEventListener('scroll', () => {
      handleMarqueeScroll();
      handleTextScroll();
      handleProjectScale();
    }, { passive: true });

    window.addEventListener('mousemove', handleMouseMove);

    // Initial calls
    handleMarqueeScroll();
    handleTextScroll();
    handleProjectScale();
  </script>
</body>
</html>
